# ScienceOn 수집 설정 템플릿 — 프로젝트별로 복제해 사용
#   uv run scienceon collect --config config/<프로젝트명>.yaml

project: borderline
target: ARTI                  # ARTI(논문) | REPORT(보고서) | ATT(동향) | RESEARCHER | ORGAN
year: "2005~2025"             # 발행연도/범위(틸드 ~). 비우면 전체

# ── 검색 방식 3가지 (택1) ─────────────────────────────────────────
# (1) 단일:        query: "경계선지능"  + field: BI
# (2) 다중 용어:   terms: [경계선지능, 경계선지적기능]  + field: BI  (+ contains)
# (3) 다중 그룹(권장): 아래 searches — 그룹마다 다른 field·contains 적용 후 CN 합집합
#
# API 검색 팁(실측):
#  · 형태소 토큰화로 복합어 과대매칭. 변별력 있는 단어는 그대로(BI 경계선지능≈314).
#  · 색인 안 되는 토큰('느린')은 와일드카드 `*`: TI "느린*"=205(정밀).
#  · OR 는 `|`. ""(구문)·공백(AND)은 API에서 무시(웹 UI 전용).
#  · contains: 검색 후 제목·초록·키워드 substring 필터(노이즈 제거).

searches:
  # 경계선지능 계열 (BI, 필터 없음)
  - field: BI
    terms: ["경계선지능", "경계선 지능", "경계선지적기능", "경계선급 지능"]
  # 느린학습자 (와일드카드 + contains 로 '학습자' 노이즈 제거)
  - field: TI
    terms: ["느린*", "느리*"]
    contains: ["느린학습자", "느린 학습자", "느린학습", "느리게 배우"]
  - field: BI
    terms: ["느린학습*"]
    contains: ["느린학습자", "느린 학습자", "느린학습"]
  # 영문 동의어 — 국문 논문이 영문 제목/초록/키워드에 쓴 경우. lang 으로 국내(국문) 한정.
  # 영문어는 해외논문이 많아(수천건) max 로 상위 N건만 보고 contains+lang 으로 거른다(용어별 분리).
  - field: BI
    terms: ["borderline intellectual functioning"]
    contains: ["borderline intellectual functioning"]
    lang: ["한국어"]
    max: 300
  - field: BI
    terms: ["borderline intelligence"]
    contains: ["borderline intelligence"]
    lang: ["한국어"]
    max: 300
  - field: BI
    terms: ["slow learner*"]
    contains: ["slow learner"]
    lang: ["한국어"]
    max: 300

max_records: 3000
rows_per_page: 100
throttle_sec: 0.5
sort: { field: "", order: DESC }    # 예: pubyear

output:
  formats: [xlsx, csv, json, sqlite]
  dir: "output/borderline"
